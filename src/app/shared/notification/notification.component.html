<div class="notify-stack" *ngIf="notify.visible">
  <section
    class="notify-box"
    [ngClass]="notify.type"
    role="alert"
    aria-live="assertive"
  >
    <div class="notify-icon">
      <span *ngIf="notify.type === 'success'">OK</span>
      <span *ngIf="notify.type === 'warning'">!</span>
      <span *ngIf="notify.type === 'info'">i</span>
      <span *ngIf="notify.type === 'error' || !notify.type">x</span>
    </div>

    <div class="notify-content">
      <strong>{{ notify.title }}</strong>
      <p>{{ notify.message }}</p>
    </div>

    <button
      type="button"
      class="notify-close"
      (click)="notify.close()"
      aria-label="Close notification"
    >
      <i class="fa-solid fa-x"></i>
    </button>
  </section>
</div>
